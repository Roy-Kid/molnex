name: CI

on:
  push:
    branches:
      - master
      - dev
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      # Pre-install build prerequisites in the outer env so the
      # subsequent ``--no-build-isolation`` install can use them.
      - name: Install build prerequisites
        run: |
          python -m pip install --upgrade pip
          pip install "cmake>=4" ninja "torch>=2.10"

      # ``src/molix/op/CMakeLists.txt`` does ``find_package(Torch
      # REQUIRED)``, which needs ``TorchConfig.cmake`` on
      # ``CMAKE_PREFIX_PATH``.  The torch wheel ships its CMake config
      # under ``<site-packages>/torch/share/cmake``; expose that path
      # so cmake actually finds it on stock GitHub runners (Alvis
      # picks it up via system hooks).
      - name: Install project
        run: |
          export CMAKE_PREFIX_PATH="$(python -c 'import torch; print(torch.utils.cmake_prefix_path)')"
          echo "CMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH"
          pip install -e ".[dev]" --no-build-isolation -v
        timeout-minutes: 20

      - name: Ruff format
        run: ruff format --check src/ tests/

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Type check
        run: ty check src/

  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Pinned to 3.14 — that's the only Python the project is
        # validated against (matches the dev venv on Alvis).  Add
        # back 3.10/3.11/3.12 here if/when those Python versions are
        # exercised locally.
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build prerequisites
        run: |
          python -m pip install --upgrade pip
          pip install "cmake>=4" ninja "torch>=2.10"

      - name: Install dependencies
        run: |
          export CMAKE_PREFIX_PATH="$(python -c 'import torch; print(torch.utils.cmake_prefix_path)')"
          echo "CMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH"
          pip install -e ".[dev]" --no-build-isolation -v
        timeout-minutes: 20

      # ``-p no:cacheprovider`` avoids creating .pytest_cache (cache is
      # useless across fresh runners).  Tests that strictly require GPU
      # should self-skip via ``pytest.importorskip`` or
      # ``pytest.mark.skipif(not torch.cuda.is_available())``; the suite
      # is otherwise CPU-runnable.
      - name: Run tests
        run: pytest tests/ -q --cov=src/ --cov-report=xml -p no:cacheprovider

      - name: Upload coverage
        if: matrix.python-version == '3.14'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
