name: CI

on:
  push:
    branches:
      - master
      - dev
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      # Pre-install build prerequisites in the outer env so the
      # subsequent ``--no-build-isolation`` install can use them.  In
      # particular, ``src/molix/op/CMakeLists.txt`` does
      # ``find_package(Torch REQUIRED)`` which needs TorchConfig.cmake
      # on disk — it ships inside the torch wheel, so torch must be
      # installed before the build runs.
      - name: Install build prerequisites
        run: |
          python -m pip install --upgrade pip
          pip install "cmake>=4" ninja "torch>=2.10"

      # Install the project (with dev extras) without build isolation so
      # ``find_package(Torch)`` resolves and ty can resolve every
      # third-party import (cuequivariance, torch, molcrafts-*) at
      # type-check time.  ``MOLNEX_OP_ENABLE_CUDA`` defaults OFF so the
      # C++ extension builds CPU-only on the GitHub runner.
      - name: Install project
        run: pip install -e ".[dev]" --no-build-isolation -v
        timeout-minutes: 20

      - name: Ruff format
        run: ruff format --check src/ tests/

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Type check
        run: ty check src/

  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Pinned to 3.14 — that's the only Python the project is
        # validated against (matches the dev venv on Alvis).  Add
        # back 3.10/3.11/3.12 here if/when those Python versions are
        # exercised locally.
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build prerequisites
        run: |
          python -m pip install --upgrade pip
          pip install "cmake>=4" ninja "torch>=2.10"

      - name: Install dependencies
        run: pip install -e ".[dev]" --no-build-isolation -v
        timeout-minutes: 20

      # ``-p no:cacheprovider`` avoids creating .pytest_cache (cache is
      # useless across fresh runners).  Tests that strictly require GPU
      # should self-skip via ``pytest.importorskip`` or
      # ``pytest.mark.skipif(not torch.cuda.is_available())``; the suite
      # is otherwise CPU-runnable.
      - name: Run tests
        run: pytest tests/ -q --cov=src/ --cov-report=xml -p no:cacheprovider

      - name: Upload coverage
        if: matrix.python-version == '3.14'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
