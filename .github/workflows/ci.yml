name: CI

on:
  push:
    branches:
      - master
      - dev
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install the project (with dev extras) so ``ty`` can resolve every
      # third-party import (cuequivariance, torch, molcrafts-*).  The
      # build pulls cmake>=4 + ninja via ``[build-system].requires`` and
      # compiles the C++ ``molnex_op`` extension; ``MOLNEX_OP_ENABLE_CUDA``
      # defaults OFF so this builds CPU-only on the GitHub runner.
      - name: Install project
        run: pip install -e ".[dev]"

      - name: Ruff format
        run: ruff format --check src/ tests/

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Type check
        run: ty check src/

  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      # ``-p no:cacheprovider`` avoids creating .pytest_cache (writable
      # /tmp on CI is fine, but cache is useless across fresh runners).
      # Tests that require a GPU should self-skip via
      # ``pytest.importorskip`` or ``pytest.mark.skipif``; the suite is
      # CPU-runnable as long as cuequivariance imports cleanly.
      - name: Run tests
        run: pytest tests/ -q --cov=src/ --cov-report=xml -p no:cacheprovider

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
