name: CI

# This project ships a torch C++ extension (``src/molix/op/``) and a
# stack of GPU-equivariance dependencies (``cuequivariance``,
# ``cuequivariance-torch``).  Installing the project on a stock
# ``ubuntu-latest`` GitHub runner has not been made to work end-to-end
# from a fresh clone; the install only succeeds in the Alvis dev
# environment where the system toolchain is already lined up.  Until a
# self-hosted GPU runner exists, CI runs only the parts that don't need
# a working install — ``ruff format`` and ``ruff check`` on the source
# tree.  ``ty`` (type check) and the ``pytest`` suite both depend on
# importable third-party stacks; those stay as local-dev gates instead.

on:
  push:
    branches:
      - master
      - dev
  pull_request:

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install ruff
        run: pip install "ruff>=0.15"

      - name: Ruff format
        run: ruff format --check src/ tests/

      - name: Ruff lint
        run: ruff check src/ tests/
